<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album – Responsive Gallery</title>
    <meta name="description"
        content="A responsive temple album showcasing Latter-day Saint temples from around the world. Built with mobile-first CSS Flexbox, CSS Grid, and custom design aesthetics.">
    <meta name="author" content="Orlando Vivas">

    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <!-- Deferred JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>

<body>
    <header>
        <div class="header-container">
            <h1>Temple Album</h1>
            <button id="menu-btn" aria-label="Toggle Navigation Menu" aria-expanded="false">&#9776;</button>
            <nav>
                <a href="#" class="active">Home</a>
                <a href="#">Old</a>
                <a href="#">New</a>
                <a href="#">Large</a>
                <a href="#">Small</a>
            </nav>
        </div>
    </header>

    <main>
        <h2>Explore Latter-day Saint Temples</h2>

        <div class="gallery-grid">
            <!-- Temple 1 -->
            <figure>
                <a href="https://en.wikipedia.org/wiki/File:Salt_Lake_Temple,_Utah_-_Sept_2004.jpg" target="_blank"
                    rel="noopener noreferrer">
                    <div class="image-container">
                        <img src="images/salt_lake.jpg" alt="Salt Lake Temple" loading="lazy">
                    </div>
                </a>
                <figcaption>
                    <h3><a href="https://en.wikipedia.org/wiki/File:Salt_Lake_Temple,_Utah_-_Sept_2004.jpg"
                            target="_blank" rel="noopener noreferrer">Salt Lake Temple</a></h3>
                    <p><strong>Location:</strong> Salt Lake City, Utah, USA</p>
                    <p><strong>Dedicated:</strong> April 6, 1893</p>
                </figcaption>
            </figure>

            <!-- Temple 2 -->
            <figure>
                <a href="https://en.wikipedia.org/wiki/File:RomeTempleatSunset.jpg" target="_blank"

                        <img src="images/rome_italy.jpg" alt="Rome Italy Temple" loading="lazy">
                    </div>
                </a>
                <figcaption>
                    <h3><a href="https://en.wikipedia.org/wiki/File:RomeTempleatSunset.jpg" target="_blank"
                            rel="noopener noreferrer">Rome Italy Temple</a></h3>
                    <p><strong>Location:</strong> Rome, Italy</p>
                    <p><strong>Dedicated:</strong> March 10, 2019</p>

                    <p><strong>Location:</strong> Paris, France</p>
                    <p><strong>Dedicated:</strong> May 21, 2017</p>
